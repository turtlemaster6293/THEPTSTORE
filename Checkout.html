<!DOCTYPE html>
<html>

<head>
  <title>The Patrick F. Taylor Shop</title>
  <link rel="stylesheet" href="style.css">

</head>

<body>
<div id="all-contents">
   <nav>
    <h1>The PT Shop</h1>
    <ul id="nav-ul">
      <li class="nav-li"><a href="index.html">Home</a></li>
      <li class="nav-li"><a href="Shop.html">Shop</a></li>
      <li class="nav-li"><a href="Checkout.html">Checkout</a></li>
      <li class="nav-li"><a href="Signin.html">Sign in</a></li>
    </ul>
  </nav>
  <h1>Checkout</h1>
  <div id="Items">
    <ul>
        <!-- Item 1 -->
        <li data-id="item-1">
             <img src="/popcorners.jpeg" alt="PopCorners">
            <span class="label-text">Popcorners (1$)</span>
            <!-- The number below will dynamically update -->
            <span class="count-box">Ordered: <span class="count">0</span>/5</span>
            <!-- NEW RESET BUTTON ELEMENT -->
            <button class="reset-btn">Remove all</button>
        </li>

        <!-- Item 2 -->
        <li data-id="item-2">
           <img src="/rice crispy treat.webp" alt="RiceCrispy">
            <span class="label-text">Rice Crispy (1$)</span>
            <!-- The number below will dynamically update -->
            <span class="count-box">Ordered: <span class="count">0</span>/5</span>
            <!-- NEW RESET BUTTON ELEMENT -->
            <button class="reset-btn">Remove all</button>
        </li>

        <!-- Item 3 -->
        <li data-id="item-3">
             <img src="/CapriSun.jpeg" alt="CapriSun">
            <span class="label-text">Capri Suns (1$)</span>
            <!-- The number below will dynamically update -->
            <span class="count-box">Ordered: <span class="count">0</span>/5</span>
            <!-- NEW RESET BUTTON ELEMENT -->
            <button class="reset-btn">Remove all</button>
        </li>
    </ul>
</div>




<script>
    // 1. First, load the initial counts when the results page opens
    document.querySelectorAll('#Items li').forEach(item => {
        const itemId = item.getAttribute('data-id');
        const countDisplay = item.querySelector('.count');
        const resetBtn = item.querySelector('.reset-btn');

        if (countDisplay && itemId) {
            let savedCount = localStorage.getItem(itemId) || 0;
            countDisplay.textContent = savedCount;
            if (parseInt(savedCount) >= 5) item.style.opacity = "0.5";
        }

        // 2. Add local reset button handling directly on the results page
        if (resetBtn) {
            resetBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                
                // Clear the element on screen and in browser storage
                if (countDisplay) countDisplay.textContent = 0;
                localStorage.setItem(itemId, 0); 
                
                // Reset card styling back to normal
                item.style.opacity = "1";
            });
        }
    });
</script>


  </body>
